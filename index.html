<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Pro - Toca do Atleta</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        
        /* Cabeçalho com Logo */
        .header { 
            background: white; 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 3px solid #d32f2f;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header img { height: 60px; } /* Ajuste de tamanho da logo */
        .header h1 { color: #d32f2f; margin: 0; font-size: 24px; }

        .main-container { display: flex; width: 100%; min-height: 60vh; padding-top: 10px; }
        .produtos { flex: 2; padding: 20px; border-right: 2px solid #ddd; background: #f9f9f9; }
        .sacola { width: 400px; padding: 20px; background: white; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        .historico { padding: 20px; background: #fff; border-top: 4px solid #d32f2f; min-height: 40vh; }
        
        h2, h3 { color: #d32f2f; margin-top: 0; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; font-size: 14px; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #d32f2f; color: white; position: sticky; top: 0; z-index: 5; }

        .btn-add { background: #2e7d32; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-finalizar { background: #d32f2f; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; width: 100%; }
        .btn-recibo-hist { background: #ffa000; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-exportar { background: #1976d2; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; }
        
        .item-sacola { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #ccc; }
        .btn-remover { background: #ff5252; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 4px 10px; }

        .total-box { border-top: 2px solid #d32f2f; padding-top: 20px; margin-top: 20px; }
        .val-final { color: #2e7d32; font-size: 2.2rem; font-weight: bold; text-align: right; margin: 10px 0; }

        .acoes-hist { display: flex; gap: 10px; float: right; align-items: center; flex-wrap: wrap; }
        .resumo-caixa { background: #e8f5e9; padding: 8px 15px; border-radius: 5px; font-weight: bold; color: #2e7d32; border: 1px solid #2e7d32; }
        .tag-pagamento { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #eee; color: #666; font-weight: bold; display: block; margin-top: 2px; }
        
        .admin-catalogo { background: #eee; padding: 15px; border-radius: 5px; margin-bottom: 20px; display: flex; gap: 10px; border-left: 5px solid #2e7d32; }
        .btn-del-prod { color: #d32f2f; border: none; background: none; cursor: pointer; font-weight: bold; }

        #campo-parcelas { display: none; }
    </style>
</head>
<body>

<header class="header">
    <img src="tocaa-removebg-preview.png" alt="Logo Toca do Atleta">
    <h1>PDV Interno</h1>
</header>

<div class="main-container">
    <div class="produtos">
        <h2>Catálogo de Suplementos</h2>
        
        <div class="admin-catalogo">
            <input type="text" id="novo-nome" placeholder="Novo Produto" style="margin-bottom:0">
            <input type="number" id="novo-preco" placeholder="Preço R$" style="margin-bottom:0; width: 120px;">
            <button class="btn-add" onclick="cadastrarProduto()">CADASTRAR</button>
        </div>

        <input type="text" id="busca-prod" onkeyup="filtrarProdutos()" placeholder="🔎 Buscar no catálogo...">
        <table id="tabela-produtos">
            <thead>
                <tr><th>Produto</th><th>Preço</th><th>Ações</th></tr>
            </thead>
            <tbody id="corpo-catalogo"></tbody>
        </table>
    </div>

    <div class="sacola">
        <h2>Sacola de Compras</h2>
        <div id="lista-sacola"></div>
        <div class="total-box">
            <div style="display:flex; justify-content: space-between; font-weight: bold;">
                <span>Subtotal:</span><span id="subtotal">R$ 0,00</span>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <div style="flex:1"><label style="font-size:11px">Desc %</label><input type="number" id="desc-porcent" value="0" oninput="calcularTudo()"></div>
                <div style="flex:1"><label style="font-size:11px">Desc R$</label><input type="number" id="desc-reais" value="0" oninput="calcularTudo()"></div>
            </div>
            <input type="text" id="cpf-cliente" placeholder="CPF do Cliente (Opcional)">
            <select id="metodo-pagamento" onchange="verificarParcelas()">
                <option value="Dinheiro">Dinheiro</option>
                <option value="Pix">Pix</option>
                <option value="Cartão de Crédito">Cartão de Crédito</option>
                <option value="Cartão de Débito">Cartão de Débito</option>
            </select>
            <div id="campo-parcelas">
                <select id="parcelas">
                    <option value="1">1x (À vista)</option>
                    <option value="2">2x</option><option value="3">3x</option><option value="4">4x</option>
                    <option value="5">5x</option><option value="6">6x</option><option value="7">7x</option>
                    <option value="12">12x</option>
                </select>
            </div>
            <div class="val-final" id="total-final">R$ 0,00</div>
            <button class="btn-finalizar" onclick="finalizarVenda()">FECHAR VENDA</button>
        </div>
    </div>
</div>

<div class="historico">
    <div class="acoes-hist">
        <div class="resumo-caixa">Caixa Hoje: <span id="total-acumulado">R$ 0,00</span></div>
        <input type="text" id="busca-hist" onkeyup="renderHistorico()" placeholder="🔎 Buscar por CPF ou Produto..." style="width: 200px; margin-bottom:0">
        <button class="btn-exportar" onclick="exportarCSV()">📥 Baixar Relatório</button>
        <button onclick="limparHistorico()" style="cursor:pointer; color:#d32f2f; background:none; border:none; text-decoration:underline; font-size: 12px;">Zerar Tudo</button>
    </div>
    <h3>📊 Vendas Salvas</h3>
    <table id="tabela-historico">
        <thead>
            <tr><th>Data/Hora</th><th>Itens</th><th>Pagto / CPF</th><th>Total</th><th>Ações</th></tr>
        </thead>
        <tbody id="corpo-historico"></tbody>
    </table>
</div>

<script>
    let sacola = [];
    let historicoVendas = [];
    let catalogo = JSON.parse(localStorage.getItem('catalogo_toca')) || [
        {nome: 'Whey Protein Max 900g', preco: 149.90},
        {nome: 'Creatina Pura 300g', preco: 89.00},
        {nome: 'Camisa Dry Fit (M)', preco: 55.00}
    ];

    function carregarDados() {
        try {
            const salvo = localStorage.getItem('vendas_toca') || localStorage.getItem('vendas_pdv');
            historicoVendas = salvo ? JSON.parse(salvo) : [];
        } catch(e) {
            historicoVendas = [];
        }
    }

    window.onload = () => {
        carregarDados();
        renderCatalogo();
        renderHistorico();
    };

    function renderCatalogo() {
        const corpo = document.getElementById("corpo-catalogo");
        corpo.innerHTML = catalogo.map((prod, index) => `
            <tr>
                <td><b>${prod.nome}</b></td>
                <td>R$ ${parseFloat(prod.preco).toFixed(2)}</td>
                <td>
                    <button class="btn-add" onclick="add('${prod.nome}', ${prod.preco})">+</button>
                    <button class="btn-del-prod" onclick="excluirProduto(${index})">🗑️</button>
                </td>
            </tr>
        `).join('');
        localStorage.setItem('catalogo_toca', JSON.stringify(catalogo));
    }

    function cadastrarProduto() {
        const nome = document.getElementById("novo-nome").value;
        const preco = parseFloat(document.getElementById("novo-preco").value);
        if(!nome || isNaN(preco)) return alert("Preencha nome e preço!");
        catalogo.push({nome, preco});
        document.getElementById("novo-nome").value = "";
        document.getElementById("novo-preco").value = "";
        renderCatalogo();
    }

    function excluirProduto(index) {
        if(confirm("Remover este produto do catálogo?")) {
            catalogo.splice(index, 1);
            renderCatalogo();
        }
    }

    function filtrarProdutos() {
        let input = document.getElementById("busca-prod").value.toLowerCase();
        let rows = document.querySelectorAll("#corpo-catalogo tr");
        rows.forEach(tr => tr.style.display = tr.innerText.toLowerCase().includes(input) ? "" : "none");
    }

    function verificarParcelas() {
        const metodo = document.getElementById("metodo-pagamento").value;
        document.getElementById("campo-parcelas").style.display = (metodo === "Cartão de Crédito") ? "block" : "none";
    }

    function add(nome, preco) {
        sacola.push({nome, preco: parseFloat(preco)});
        renderSacola();
    }

    function removerDaSacola(index) {
        sacola.splice(index, 1);
        renderSacola();
    }

    function renderSacola() {
        const lista = document.getElementById("lista-sacola");
        lista.innerHTML = sacola.map((i, index) => `
            <div class="item-sacola">
                <span>${i.nome}</span> 
                <span>R$ ${i.preco.toFixed(2)} <button class="btn-remover" onclick="removerDaSacola(${index})">x</button></span>
            </div>
        `).join('');
        calcularTudo();
    }

    function calcularTudo() {
        let sub = sacola.reduce((acc, i) => acc + i.preco, 0);
        let descP = parseFloat(document.getElementById("desc-porcent").value) || 0;
        let descR = parseFloat(document.getElementById("desc-reais").value) || 0;
        let total = (sub - (sub * (descP / 100))) - descR;
        if (total < 0) total = 0;
        document.getElementById("subtotal").innerText = `R$ ${sub.toFixed(2)}`;
        document.getElementById("total-final").innerText = `R$ ${total.toFixed(2)}`;
        return { sub, total, descP, descR };
    }

    function finalizarVenda() {
        if(sacola.length === 0) return alert("Adicione produtos primeiro!");
        const valores = calcularTudo();
        const metodo = document.getElementById("metodo-pagamento").value;
        const parcelas = (metodo === "Cartão de Crédito") ? document.getElementById("parcelas").value : "1";
        const cpf = document.getElementById("cpf-cliente").value || "N/A";
        const dataHora = new Date().toLocaleString('pt-BR');

        historicoVendas.push({ 
            dataHora, 
            itens: [...sacola], 
            total: valores.total, 
            metodo, 
            parcelas, 
            cpf 
        });
        
        localStorage.setItem('vendas_toca', JSON.stringify(historicoVendas));
        sacola = [];
        document.getElementById("cpf-cliente").value = "";
        document.getElementById("desc-porcent").value = 0;
        document.getElementById("desc-reais").value = 0;
        renderSacola();
        renderHistorico();
        alert("Venda Finalizada com Sucesso!");
    }

    function renderHistorico() {
        const corpo = document.getElementById("corpo-historico");
        const busca = document.getElementById("busca-hist").value.toLowerCase();
        let somaTotal = 0;
        corpo.innerHTML = "";

        const filtradas = historicoVendas.filter(v => {
            if (!v) return false;
            const itensTxt = Array.isArray(v.itens) ? v.itens.map(i => i.nome).join(' ').toLowerCase() : "venda antiga";
            const cpfTxt = (v.cpf || "N/A").toLowerCase();
            return cpfTxt.includes(busca) || itensTxt.includes(busca);
        });

        [...filtradas].reverse().forEach((v) => {
            const totalVenda = parseFloat(v.total || 0);
            somaTotal += totalVenda;
            let indexOriginal = historicoVendas.indexOf(v);
            
            let tr = document.createElement("tr");
            const listaItens = Array.isArray(v.itens) ? v.itens.map(i=>i.nome).join(', ') : "Dados antigos";
            
            tr.innerHTML = `
                <td style="font-size:11px">${v.dataHora || 'Sem data'}</td>
                <td style="font-size:11px">${listaItens}</td>
                <td>
                    <small>CPF: ${v.cpf || 'N/A'}</small>
                    <span class="tag-pagamento">${v.metodo || 'Padrão'} ${v.metodo==='Cartão de Crédito'?(v.parcelas||1)+'x':''}</span>
                </td>
                <td><b>R$ ${totalVenda.toFixed(2)}</b></td>
                <td><button class="btn-recibo-hist" onclick="gerarRecibo(${indexOriginal})">Recibo</button></td>
            `;
            corpo.appendChild(tr);
        });
        document.getElementById("total-acumulado").innerText = `R$ ${somaTotal.toFixed(2)}`;
    }

    function gerarRecibo(index) {
        const v = historicoVendas[index];
        const listaItens = Array.isArray(v.itens) ? v.itens.map(i=>`<p>${i.nome} - R$ ${i.preco.toFixed(2)}</p>`).join('') : '<p>Venda antiga</p>';
        
        const janelaRecibo = window.open('', '_blank', 'width=400,height=600');
        janelaRecibo.document.write(`
            <html><body style="font-family:monospace;padding:20px;">
            <center><img src="tocaa-removebg-preview.png" style="width:100px;"><br><h3>TOCA DO ATLETA</h3><p>${v.dataHora}</p></center>
            <hr>
            ${listaItens}
            <hr>
            <p><b>TOTAL: R$ ${parseFloat(v.total).toFixed(2)}</b></p>
            <p>Pgto: ${v.metodo} ${v.metodo==='Cartão de Crédito'?(v.parcelas||1)+'x':''}</p>
            <p>CPF: ${v.cpf}</p>
            <script>window.onload=function(){window.print();setTimeout(window.close,500);}<\/script>
            </body></html>
        `);
        janelaRecibo.document.close();
    }

    function exportarCSV() {
        if(historicoVendas.length === 0) return alert("Sem dados!");
        let csv = "\ufeffData;Itens;Pagamento;CPF;Total\n";
        historicoVendas.forEach(v => {
            const itensStr = Array.isArray(v.itens) ? v.itens.map(i => i.nome).join(' | ') : "Antigo";
            csv += `${v.dataHora};${itensStr};${v.metodo};${v.cpf};${parseFloat(v.total).toFixed(2).replace('.', ',')}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Vendas_Toca_Atleta.csv";
        link.click();
    }

    function limparHistorico() {
        if(confirm("APAGAR TUDO? Isso não pode ser desfeito.")) {
            localStorage.removeItem('vendas_toca');
            historicoVendas = [];
            renderHistorico();
        }
    }
</script>
</body>
</html>
