<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Pro - Toca do Atleta</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; color: #333; }
        
        /* Cabeçalho */
        .header {
            background: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #d32f2f;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header img { max-height: 80px; margin-bottom: 10px; }
        .header h1 { margin: 0; color: #d32f2f; font-size: 24px; }

        .main-container { display: flex; flex-wrap: wrap; width: 100%; padding: 20px; gap: 20px; }
        
        /* Seções principais */
        .col-produtos { flex: 2; min-width: 350px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .col-sacola { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #d32f2f; }

        /* Inputs e Botões */
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; width: 100%; font-size: 14px; }
        .btn-add { background: #2e7d32; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-finalizar { background: #d32f2f; color: white; border: none; padding: 18px; border-radius: 6px; cursor: pointer; font-size: 20px; font-weight: bold; width: 100%; margin-top: 15px; }
        
        /* Tabela de Produtos */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #d32f2f; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .acoes-btn { display: flex; gap: 8px; }
        .btn-edit { color: #1976d2; background: none; border: none; cursor: pointer; font-size: 18px; }
        .btn-del { color: #d32f2f; background: none; border: none; cursor: pointer; font-size: 18px; }

        /* Sacola */
        .item-sacola { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ddd; }
        .val-final { font-size: 28px; font-weight: bold; color: #2e7d32; text-align: right; margin: 15px 0; }

        .historico { margin: 20px; background: white; padding: 20px; border-radius: 8px; border-top: 4px solid #333; }
        #campo-parcelas { display: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://raw.githubusercontent.com/tocadoatleta-teste/toca-do-atleta/main/tocaa-removebg-preview.png" onerror="this.src='https://via.placeholder.com/150?text=Toca+do+Atleta'" alt="Logo">
    <h1>Toca do Atleta - PDV</h1>
</div>

<div class="main-container">
    <div class="col-produtos">
        <h3>📦 Catálogo de Produtos</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="novo-nome" placeholder="Nome do Produto">
            <input type="number" id="novo-preco" placeholder="R$ 0.00" style="width:150px;">
            <button class="btn-add" onclick="cadastrarProduto()" style="height:45px;">+ Cadastrar</button>
        </div>
        <input type="text" id="busca-prod" onkeyup="filtrarProdutos()" placeholder="🔎 Buscar produto no catálogo...">
        
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpo-catalogo"></tbody>
        </table>
    </div>

    <div class="col-sacola">
        <h3>🛒 Sacola de Compras</h3>
        <div id="lista-sacola" style="min-height: 100px;"></div>
        
        <div style="margin-top:20px; border-top: 1px solid #eee; padding-top:10px;">
            <div style="display:flex; justify-content:space-between;">
                <span>Subtotal:</span> <span id="subtotal">R$ 0,00</span>
            </div>
            <div style="display:flex; gap:10px; margin: 10px 0;">
                <div><small>Desc %</small><input type="number" id="desc-porcent" value="0" oninput="calcularTudo()"></div>
                <div><small>Desc R$</small><input type="number" id="desc-reais" value="0" oninput="calcularTudo()"></div>
            </div>
            
            <input type="text" id="cpf-cliente" placeholder="CPF na Nota (Opcional)">
            
            <select id="metodo-pagamento" onchange="verificarParcelas()">
                <option value="Dinheiro">Dinheiro</option>
                <option value="Pix">Pix</option>
                <option value="Cartão de Débito">Cartão de Débito</option>
                <option value="Cartão de Crédito">Cartão de Crédito</option>
            </select>

            <div id="campo-parcelas">
                <select id="parcelas">
                    <option value="1">1x (À vista)</option>
                    <option value="2">2x</option><option value="3">3x</option><option value="4">4x</option>
                    <option value="5">5x</option><option value="6">6x</option><option value="10">10x</option>
                </select>
            </div>

            <div class="val-final" id="total-final">R$ 0,00</div>
            <button class="btn-finalizar" onclick="finalizarVenda()">FECHAR VENDA</button>
        </div>
    </div>
</div>

<div class="historico">
    <h3>📊 Histórico de Hoje</h3>
    <table id="tabela-historico">
        <thead>
            <tr>
                <th>Hora</th>
                <th>Itens</th>
                <th>Total</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="corpo-historico"></tbody>
    </table>
    <button onclick="limparHistorico()" style="background:none; border:none; color:red; cursor:pointer; text-decoration:underline;">Zerar Histórico</button>
</div>

<script>
    let sacola = [];
    let historicoVendas = JSON.parse(localStorage.getItem('vendas_toca')) || [];
    let catalogo = JSON.parse(localStorage.getItem('catalogo_toca')) || [
        {nome: 'Whey Protein Max 900g', preco: 149.90},
        {nome: 'Creatina Pura 300g', preco: 89.00},
        {nome: 'Camisa Dry Fit (M)', preco: 55.00}
    ];

    window.onload = () => {
        renderCatalogo();
        renderHistorico();
    };

    function renderCatalogo() {
        const corpo = document.getElementById("corpo-catalogo");
        corpo.innerHTML = catalogo.map((prod, index) => `
            <tr>
                <td>${prod.nome}</td>
                <td>R$ ${prod.preco.toFixed(2)}</td>
                <td class="acoes-btn">
                    <button class="btn-add" onclick="addSacola(${index})">+</button>
                    <button class="btn-edit" onclick="editarProduto(${index})">✏️</button>
                    <button class="btn-del" onclick="excluirProduto(${index})">🗑️</button>
                </td>
            </tr>
        `).join('');
        localStorage.setItem('catalogo_toca', JSON.stringify(catalogo));
    }

    function addSacola(index) {
        sacola.push({...catalogo[index]});
        renderSacola();
    }

    function renderSacola() {
        const lista = document.getElementById("lista-sacola");
        lista.innerHTML = sacola.map((item, i) => `
            <div class="item-sacola">
                <span>${item.nome}</span>
                <span>R$ ${item.preco.toFixed(2)} <button onclick="removerSacola(${i})" style="color:red; border:none; background:none; cursor:pointer;">x</button></span>
            </div>
        `).join('');
        calcularTudo();
    }

    function removerSacola(i) {
        sacola.splice(i, 1);
        renderSacola();
    }

    function calcularTudo() {
        let sub = sacola.reduce((acc, item) => acc + item.preco, 0);
        let dP = parseFloat(document.getElementById("desc-porcent").value) || 0;
        let dR = parseFloat(document.getElementById("desc-reais").value) || 0;
        let total = (sub - (sub * dP/100)) - dR;
        if(total < 0) total = 0;
        document.getElementById("subtotal").innerText = `R$ ${sub.toFixed(2)}`;
        document.getElementById("total-final").innerText = `R$ ${total.toFixed(2)}`;
        return total;
    }

    function finalizarVenda() {
        if(sacola.length === 0) return alert("Adicione produtos!");
        const total = calcularTudo();
        const venda = {
            hora: new Date().toLocaleTimeString(),
            itens: sacola.map(i => i.nome).join(', '),
            total: total,
            metodo: document.getElementById("metodo-pagamento").value
        };
        historicoVendas.push(venda);
        localStorage.setItem('vendas_toca', JSON.stringify(historicoVendas));
        alert("Venda realizada!");
        sacola = [];
        renderSacola();
        renderHistorico();
    }

    function renderHistorico() {
        const corpo = document.getElementById("corpo-historico");
        corpo.innerHTML = historicoVendas.map(v => `
            <tr>
                <td>${v.hora}</td>
                <td>${v.itens}</td>
                <td>R$ ${v.total.toFixed(2)}</td>
                <td><button onclick="alert('Funcionalidade de cupom em breve')" class="btn-add" style="padding:5px 10px; font-size:10px;">Cupom</button></td>
            </tr>
        `).reverse().join('');
    }

    function cadastrarProduto() {
        const nome = document.getElementById("novo-nome").value;
        const preco = parseFloat(document.getElementById("novo-preco").value);
        if(!nome || isNaN(preco)) return alert("Preencha os dados!");
        catalogo.push({nome, preco});
        renderCatalogo();
    }

    function editarProduto(index) {
        const novoNome = prompt("Novo nome:", catalogo[index].nome);
        const novoPreco = prompt("Novo preço:", catalogo[index].preco);
        if(novoNome) catalogo[index].nome = novoNome;
        if(novoPreco) catalogo[index].preco = parseFloat(novoPreco);
        renderCatalogo();
    }

    function excluirProduto(index) {
        if(confirm("Excluir item?")) {
            catalogo.splice(index, 1);
            renderCatalogo();
        }
    }

    function filtrarProdutos() {
        const busca = document.getElementById("busca-prod").value.toLowerCase();
        const linhas = document.querySelectorAll("#corpo-catalogo tr");
        linhas.forEach(linha => {
            linha.style.display = linha.innerText.toLowerCase().includes(busca) ? "" : "none";
        });
    }
