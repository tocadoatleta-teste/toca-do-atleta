<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Pro - Toca do Atleta</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        
        /* Cabeçalho do Sistema */
        .header-logo {
            background: #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid #d32f2f;
            margin-bottom: 10px;
        }
        .header-logo img {
            height: 100px;
            margin-bottom: 5px;
        }

        .main-container { display: flex; width: 100%; min-height: 60vh; }
        .produtos { flex: 2; padding: 20px; border-right: 2px solid #ddd; background: #f9f9f9; }
        .sacola { width: 400px; padding: 20px; background: white; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        .historico { padding: 20px; background: #fff; border-top: 4px solid #d32f2f; min-height: 40vh; }
        
        h2, h3 { color: #d32f2f; margin-top: 0; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; font-size: 14px; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #d32f2f; color: white; position: sticky; top: 0; z-index: 5; }

        .btn-add { background: #2e7d32; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-finalizar { background: #d32f2f; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; width: 100%; }
        .btn-recibo-hist { background: #ffa000; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-exportar { background: #1976d2; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; }
        
        .item-sacola { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #ccc; }
        .btn-remover { background: #ff5252; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 4px 10px; }

        .total-box { border-top: 2px solid #d32f2f; padding-top: 20px; margin-top: 20px; }
        .val-final { color: #2e7d32; font-size: 2.2rem; font-weight: bold; text-align: right; margin: 10px 0; }

        .acoes-hist { display: flex; gap: 10px; float: right; align-items: center; flex-wrap: wrap; }
        .resumo-caixa { background: #e8f5e9; padding: 8px 15px; border-radius: 5px; font-weight: bold; color: #2e7d32; border: 1px solid #2e7d32; }
        .tag-pagamento { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #eee; color: #666; font-weight: bold; display: block; margin-top: 2px; }
        
        .admin-catalogo { background: #eee; padding: 10px; border-radius: 5px; margin-bottom: 20px; display: flex; gap: 10px; }
        .btn-del-prod { color: #d32f2f; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 18px; }
        .btn-edit-prod { color: #1976d2; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 18px; margin-right: 5px; }

        #campo-parcelas { display: none; }
    </style>
</head>
